<div style="background:{{theme.background}};min-height:100vh;font-family:Nunito,sans-serif;color:#1e293b">
  <div style="max-width:480px;margin:0 auto;padding:48px 20px;text-align:center">
    <img src="{{profile.avatar}}" alt="{{profile.name}}" style="width:96px;height:96px;border-radius:9999px;object-fit:cover;margin:0 auto 16px;border:3px solid {{theme.accent}}"/>
    <h1 style="font-size:24px;font-weight:800;margin:0 0 4px">{{profile.name}}</h1>
    <p style="color:#64748b;margin:0 0 28px">{{profile.tagline}}</p>
    <div style="display:flex;flex-direction:column;gap:12px">
      {{#each links}}
      <a href="{{url}}" style="display:block;padding:14px 16px;background:#fff;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.06);color:#1e293b;text-decoration:none;font-weight:700">
        <i class="fas {{icon}}" style="color:{{../theme.accent}};margin-right:8px"></i>{{label}}
      </a>
      {{/each}}
    </div>
  </div>
</div>
